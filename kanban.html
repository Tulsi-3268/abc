<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Signup Form</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 600 16px/18px "Open Sans", "Segoe UI", Tahoma, sans-serif;
      color: #6a6f8c;
      background: #c8c8c8;
      padding: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 525px;
      min-height: 670px;
      position: relative;
      background: url("https://raw.githubusercontent.com/khadkamhn/day-01-login-form/master/img/bg.jpg") no-repeat center;
      background-size: cover;
      box-shadow: 0 12px 15px rgba(0, 0, 0, 0.24), 0 17px 50px rgba(0, 0, 0, 0.19);
    }

    .login-html {
      width: 100%;
      height: 100%;
      position: absolute;
      padding: 90px 70px 50px;
      background: rgba(40, 57, 101, 0.9);
    }

    .login-html .sign-in-htm,
    .login-html .sign-up-htm {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
      backface-visibility: hidden;
      transition: transform 0.4s linear;
      padding: 85px 70px 50px;
    }

    .login-html .sign-in,
    .login-html .sign-up,
    .login-form .group .check {
      display: none;
    }

    .login-html .tab,
    .login-form .group .label,
    .login-form .group .button {
      text-transform: uppercase;
    }

    .login-html .tab {
      font-size: 22px;
      margin: 0 15px 22px 0;
      padding-bottom: 5px;
      display: inline-block;
      border-bottom: 2px solid transparent;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
    }

    .login-html .sign-in:checked + .tab,
    .login-html .sign-up:checked + .tab {
      color: #fff;
      border-color: #1161ee;
    }

    .login-form {
      min-height: 345px;
      position: relative;
      perspective: 1000px;
      
    }

    .login-form .group {
      margin-bottom: 15px;
    }

    .login-form .group .label,
    .login-form .group .input,
    .login-form .group .button {
      width: 100%;
      display: block;
      color: #fff;
    }

    .login-form .group .input,
    .login-form .group .button {
      border: none;
      padding: 15px 20px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    .login-form .group .input:focus {
      box-shadow: 0 0 0 2px rgba(17, 97, 238, 0.5);
      background: rgba(255, 255, 255, 0.18);
    }

    .login-form .group input[data-type="password"] {
      -webkit-text-security: circle;
    }

    .login-form .group .label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .login-form .group .button {
      background: #1161ee;
      cursor: pointer;
      font-weight: 700;
      transition: filter 0.2s ease;
    }

    .login-form .group .button:hover {
      filter: brightness(1.08);
    }

    .login-form .group label .icon {
      width: 15px;
      height: 15px;
      border-radius: 2px;
      position: relative;
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      vertical-align: middle;
      margin-right: 8px;
    }

    .login-form .group label .icon:before,
    .login-form .group label .icon:after {
      content: "";
      width: 10px;
      height: 2px;
      background: #fff;
      position: absolute;
      transition: transform 0.2s ease-in-out;
      transform: scale(0) rotate(0deg);
    }

    .login-form .group label .icon:before {
      left: 3px;
      bottom: 6px;
      width: 5px;
    }

    .login-form .group label .icon:after {
      top: 6px;
      right: 0;
    }

    .login-form .group .check:checked + label {
      color: #fff;
    }

    .login-form .group .check:checked + label .icon {
      background: #1161ee;
    }

    .login-form .group .check:checked + label .icon:before {
      transform: scale(1) rotate(45deg);
    }

    .login-form .group .check:checked + label .icon:after {
      transform: scale(1) rotate(-45deg);
    }

    .login-html .sign-in:checked + .tab + .sign-up + .tab + .login-form .sign-in-htm {
      transform: rotateY(0deg);
    }

    .login-html .sign-up:checked + .tab + .login-form .sign-up-htm {
      transform: rotateY(0deg);
    }

    .hr {
      height: 2px;
      margin: 60px 0 50px;
      background: rgba(255, 255, 255, 0.2);
    }

    .foot-lnk {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }

    @media (max-width: 620px) {
      .login-wrap {
        min-height: 620px;
      }

      .login-html {
        padding: 70px 24px 32px;
      }

      .login-html .sign-in-htm,
      .login-html .sign-up-htm {
        padding: 70px 24px 30px;
      }

      .login-html .tab {
        font-size: 19px;
        margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-html">
      <input id="tab-1" type="radio" name="tab" class="sign-in" checked />
      <label for="tab-1" class="tab">Sign In</label>

      <input id="tab-2" type="radio" name="tab" class="sign-up" />
      <label for="tab-2" class="tab">Sign Up</label>

      <div class="login-form">
        <form class="sign-in-htm">
          <div class="group">
            <label for="signin-user" class="label">Username</label>
            <input id="signin-user" type="text" class="input" required />
          </div>
          <div class="group">
            <label for="signin-pass" class="label">Password</label>
            <input id="signin-pass" type="password" class="input" data-type="password" required />
          </div>
          <div class="group">
            <input id="check" type="checkbox" class="check" checked />
            <label for="check"><span class="icon"></span> Keep me Signed in</label>
          </div>
          <div class="group">
            <button type="submit" class="button">Sign In</button>
          </div>
          <div class="hr"></div>
          <div class="foot-lnk">
            <a href="#">Forgot Password?</a>
          </div>
        </form>

        <form class="sign-up-htm">
          <div class="group">
            <label for="signup-user" class="label">Username</label>
            <input id="signup-user" type="text" class="input" required />
          </div>
          <div class="group">
            <label for="signup-pass" class="label">Password</label>
            <input id="signup-pass" type="password" class="input" data-type="password" required />
          </div>
          <div class="group">
            <label for="signup-repeat" class="label">Repeat Password</label>
            <input id="signup-repeat" type="password" class="input" data-type="password" required />
          </div>
          <div class="group">
            <label for="signup-email" class="label">Email Address</label>
            <input id="signup-email" type="email" class="input" required />
          </div>
          <div class="group">
            <button type="submit" class="button">Sign Up</button>
          </div>
          <div class="hr"></div>
          <div class="foot-lnk">
            <label for="tab-1">Already Member?</label>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
